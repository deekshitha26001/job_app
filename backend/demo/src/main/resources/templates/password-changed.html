<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Changed Successfully</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { font-size: 24px; color: #333333; margin-bottom: 20px; }
        .content { font-size: 16px; color: #555555; line-height: 1.6; }
        .success-text { color: #10b981; font-weight: bold; }
        .footer { font-size: 14px; color: #888888; margin-top: 30px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Password Changed Successfully</div>
        <div class="content">
            <p>Hello <span th:text="${name}">User</span>,</p>
            <p class="success-text">Your password has been successfully updated.</p>
            <p>You can now log in to your account with your new password.</p>
            <p>If you did not make this change, please contact our support team immediately.</p>
        </div>
        <div class="footer">
            <p>Thank you,<br>Job Portal Team</p>
        </div>
    </div>
</body>
</html>
